<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/add_course.css">
    <title>Add Course</title>
</head>
<body>
    <header>
        <h1>Personal Course Organizer</h1>
    </header>
    <hr>
    <nav>
        <div class="nav-text">
            <a href="index.html" class="na" id="a">Home</a>
            <a href="addcourse.html" class="na active" id="b">Add Course</a>
            <a href="mycourses.html" class="na" id="c">My Courses</a>
            <a href="contactus.html" class="na" id="d">Contact Us</a>
        </div>
    </nav>
    <div class="add">
        <main>
            Add courses by Course name, Lecturer,<br>Credit hours and Notes.<br>
            You can add up to 5 courses.
        </main>
        <div id="form-feedback" class="form-feedback" style="display:none;"></div>
        <div class="form-wrapper">
            <form id="course-form">
                <div class="input-group">
                    <label for="course-name">Course Name</label>
                    <input id="course-name" type="text" placeholder="Course name" required>
                </div>
                <div class="input-group">
                    <label for="course-lecturer">Course Lecturer</label>
                    <input id="course-lecturer" type="text" placeholder="Lecturer's name" required>
                </div>
                <div class="input-group">
                    <label for="credit-hours">Credit Hours</label>
                    <input id="credit-hours" type="number" placeholder="Hours" min="1" required>
                </div>
                <div class="input-group">
                    <label for="course-notes">Notes</label>
                    <textarea id="course-notes" placeholder="Additional notes" required></textarea>
                </div>
                <button type="submit" class="save-btn">Save Course</button>
            </form>
        </div>
    </div>
    <footer>
        <p>Made by Mohamed Saeed Abd El Raheem.</p>
        <p>Helwan University. Faculty of Computers and AI.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
